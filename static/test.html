<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jelly Development</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      background: rgb(15, 21, 53);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(10vw);
      opacity: 0.2;
      pointer-events: none;
    }
    .blob--tl { width: 50vw; height: 50vw; background: #385dd8; top: -20vw; left: -10vw; }
    .blob--br { width: 50vw; height: 50vw; background: #385dd8; bottom: -20vw; right: -10vw; }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4vw;
    }

    h1 {
      font-size: 7vw;
      font-weight: 900;
      color: #fff;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 2vw;
    }

    h1 span {
      background: linear-gradient(135deg, #7ba0f5, #385dd8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 2.4vw;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 4vw;
      line-height: 1.4;
    }

    a {
      background: #385dd8;
      color: #fff;
      font-size: 1.8vw;
      font-weight: 700;
      padding: 1.5vw 4.5vw;
      border-radius: 0.8vw;
      text-decoration: none;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>

  <div class="blob blob--tl"></div>
  <div class="blob blob--br"></div>

  <div class="content">
    <h1>Websites that <span>actually work.</span></h1>
    <p>Orlando web design built to get your business found on Google.</p>
    <a href="https://jellydevelopment.com">jellydevelopment.com</a>
  </div>

</body>
</html>
